<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Atreyapuram Putharekulu (ATPU)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Styles -->

    <link rel="stylesheet" href="payment.css">
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
</head>
<!-- water mark -->
    <img src="images/watermark.png" class="left-watermark">
    <!-- whatsapp floating button -->
    <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>
<body>

    <!-- Navigation Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="container checkout-container">
        <h1 class="page-title">Checkout</h1>

        <div class="checkout-layout">
            <!-- Left Column: Shipping & Payment Form -->
            <div class="checkout-form-section">

                <!-- Shipping Details -->
                <section class="checkout-step">
                    <h2 class="step-title"><i class='bx bx-map'></i> Shipping Details</h2>
                    <form id="checkout-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required placeholder="John Doe">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">Email</label>
                                <input type="email" id="email" required placeholder="john@example.com">
                            </div>
                            <div class="form-group">
                                <label for="phone">Phone</label>
                                <input type="tel" id="phone" required placeholder="9876543210">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" required placeholder="Street, Apartment, Suite, etc.">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="city">City</label>
                                <input type="text" id="city" required placeholder="City">
                            </div>
                            <div class="form-group">
                                <label for="zip">Pincode</label>
                                <input type="text" id="zip" required placeholder="500001">
                            </div>
                        </div>
                    </form>
                </section>

                <!-- Payment Method -->
                <section class="checkout-step">
                    <h2 class="step-title"><i class='bx bx-credit-card'></i> Payment Method</h2>
                    <div class="payment-options">
                        <label class="payment-option">
                            <input type="radio" name="payment" value="upi" checked>
                            <div class="option-content">
                                <span class="option-name">UPI / QR Code</span>
                                <span class="option-desc">GooglePay, PhonePe, Paytm</span>
                            </div>
                            <i class='bx bx-qr'></i>
                        </label>

                        <label class="payment-option">
                            <input type="radio" name="payment" value="card">
                            <div class="option-content">
                                <span class="option-name">Credit / Debit Card</span>
                                <span class="option-desc">Visa, Mastercard, Rupay</span>
                            </div>
                            <i class='bx bx-credit-card-front'></i>
                        </label>

                        <label class="payment-option">
                            <input type="radio" name="payment" value="cod">
                            <div class="option-content">
                                <span class="option-name">Cash on Delivery</span>
                                <span class="option-desc">Pay when you receive</span>
                            </div>
                            <i class='bx bx-money'></i>
                        </label>
                    </div>
                </section>

                <button type="submit" form="checkout-form" class="place-order-btn">Place Order</button>
            </div>

            <!-- Right Column: Order Summary -->
            <div class="order-summary-section">
                <div class="summary-card">
                    <h2>Order Summary</h2>
                    <div id="checkout-items-list" class="checkout-items-list">
                        <!-- Items injected via JS -->
                    </div>

                    <div class="summary-divider"></div>

                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="checkout-subtotal">Rs. 0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Shipping</span>
                        <span class="free-shipping">FREE</span>
                    </div>
                    <div class="summary-divider"></div>
                    <div class="summary-row total">
                        <span>Total</span>
                        <span id="checkout-total">Rs. 0.00</span>
                    </div>

                    <div class="security-badges">
                        <span><i class='bx bx-lock-alt'></i> Secure Checkout</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Success Modal (Hidden by default) -->
    <div id="success-modal" class="modal">
        <div class="modal-content">
            <i class='bx bxs-check-circle success-icon'></i>
            <h2>Order Placed Successfully!</h2>
            <p>Thank you for shopping with ATPU. Your Putharekulu will be with you shortly.</p>
            <p class="order-id">Order ID: <span id="modal-order-id">#12345</span></p>
            <button onclick="window.location.href='index.html'" class="btn-primary">Return to Home</button>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="navbar.js"></script>
    <script src="footer.js"></script>
    <script src="payment.js"></script>
</body>

</html>
