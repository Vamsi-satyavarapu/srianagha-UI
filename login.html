<body>
    <div id="navbar-placeholder"></div>
    <main class="container login-container">
        <div class="login-header">
            <h1>Log In</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a> <i class='bx bx-chevron-right'></i> <span>Account</span>
            </div>
        </div>

        <div class="login-split">
            <section class="login-form-section">
                <h2>Log In</h2>
                <form id="login-form" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <input type="email" id="email" placeholder="Email" required>
                    </div>
                    <div class="form-group">
                        <input type="password" id="password" placeholder="Password" required>
                    </div>
                    <a href="forgot_password.html" class="forgot-password">Forgot your password?</a>
                    <button type="submit" class="btn-primary">Sign In</button>
                </form>
            </section>
            <section class="new-customer-section">
                <h2>New Customer</h2>
                <p>Register with us for a faster checkout, to track the status of your order and more.</p>
                <a href="register.html" class="btn-secondary">Register</a>
            </section>
        </div>
    </main>
    <div id="footer-placeholder"></div>
    <script src="script.js"></script>
    <script src="login.js"></script>
    <script src="navbar.js"></script>
    <script src="footer.js"></script>
</body>
