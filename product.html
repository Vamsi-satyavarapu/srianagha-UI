<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Boxicons for Icons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    <link rel="stylesheet" href="product.css">

    <!-- Navbar Component -->
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
</head>
<!-- water mark -->
    <img src="images/watermark.png" class="left-watermark">
    <!-- whatsapp floating button -->
    <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>
<body>

    <!-- Navigation Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Breadcrumbs -->
    <div class="container breadcrumb">
        <a href="index.html">Home</a> <i class='bx bx-chevron-right'></i> <a href="shop.html">Shop</a> <i
            class='bx bx-chevron-right'></i> <span id="breadcrumb-product-name">Loading...</span>
    </div>

    <!-- Main Product Section -->
    <main class="container product-container">
        <!-- Product Gallery -->
        <section class="product-gallery">
            <div class="main-image-container">
                <img src="" alt="Product Image" id="main-product-image"
                    onerror="this.src='https://via.placeholder.com/600x400?text=Product+Image'">
                <span class="badge sale-badge" id="product-badge"></span>
            </div>
            <!-- Thumbnails (Simplified for now, can be expanded) -->
            <div class="thumbnail-list">
                <div class="thumbnail active">
                    <img id="thumb-1" src="" alt="View 1"
                        onerror="this.src='https://via.placeholder.com/100?text=View'">
                </div>
            </div>
        </section>

        <!-- Product Information -->
        <section class="product-details">
            <div class="product-header">
                <h2 class="brand-name">ATPU</h2>
                <h1 class="product-title" id="product-title">Loading Product...</h1>
                <div class="rating">
                    <div id="product-rating-stars" style="display:inline-block"></div>
                    <span class="review-count" id="product-reviews"></span>
                </div>
            </div>

            <div class="price-container">
                <span class="current-price" id="product-price"></span>
                <span class="original-price" id="product-original-price"></span>
                <span class="discount-tag" id="product-discount"></span>
            </div>

            <p class="product-description" id="product-description">

            </p>

            <div class="variants">
                <span class="variant-label">Category:</span>
                <div class="variant-options">
                    <span id="product-category" style="font-weight: 500; color: #333;"></span>
                </div>
            </div>

            <div class="actions">
                <div class="quantity-selector">
                    <button onclick="decreaseQuantity()" aria-label="Decrease Quantity">-</button>
                    <input type="number" id="quantity" value="1" min="1" readonly>
                    <button onclick="increaseQuantity()" aria-label="Increase Quantity">+</button>
                </div>
                <button class="add-to-cart-btn" onclick="addToCartCurrent()">
                    Add to Cart <i class='bx bx-cart'></i>
                </button>
                <button class="buy-now-btn" onclick="buyNowCurrent()"
                    style="background-color: #333; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-weight: 600; transition: background 0.3s; margin-left: 10px;">
                    Buy Now
                </button>
                <button class="wishlist-btn-main" onclick="addToWishlistCurrent(event)"
                    style="background: white; border: 1px solid #ddd; border-radius: 8px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.5rem; color: #333; transition: all 0.3s;">
                    <i class='bx bx-heart' id="wishlist-icon"></i>
                </button>
            </div>

            <div class="features">
                <div class="feature-item">
                    <i class='bx bx-package'></i>
                    <span>Premium Packaging</span>
                </div>
                <div class="feature-item">
                    <i class='bx bx-time-five'></i>
                    <span>Fresh & Handmade</span>
                </div>
                <div class="feature-item">
                    <i class='bx bx-check-shield'></i>
                    <span>100% Authentic</span>
                </div>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script src="navbar.js"></script>
    <script src="footer.js"></script>
    <script src="data.js"></script>
    <script src="product.js"></script>
  
</body>
