<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Atreyapuram Putharekulu (ATPU)</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Boxicons -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <!-- Styles -->

    <link rel="stylesheet" href="login.css"> <!-- Reusing Login Layout -->
    <link rel="stylesheet" href="forgot_password.css"> <!-- Specific overrides -->
    <link rel="stylesheet" href="navbar.css">
    <link rel="stylesheet" href="footer.css">
</head>
<!-- water mark -->
    <img src="images/watermark.png" class="left-watermark">
    <!-- whatsapp floating button -->
    <a href="https://wa.me/919876543210" target="_blank" class="whatsapp-float">
    <img src="https://upload.wikimedia.org/wikipedia/commons/6/6b/WhatsApp.svg" alt="WhatsApp">
    </a>
<body>

    <!-- Navigation Placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <main class="container login-container">
        <div class="login-header">
            <h1>Log In</h1>
            <div class="breadcrumb">
                <a href="index.html">Home</a> <i class='bx bx-chevron-right'></i> <span>Account</span>
            </div>
        </div>

        <div class="login-split">
            <!-- Reset Password Section -->
            <section class="login-form-section">
                <!-- Step 1: Email Input -->
                <div id="step-email" class="forgot-password-step active">
                    <h2>Reset your password</h2>
                    <p style="margin-bottom: 20px;">We will send you an email to reset your password.</p>
                    <form id="email-form" onsubmit="handleEmailSubmit(event)">
                        <div class="form-group">
                            <input type="email" id="email" placeholder="Email" required>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn-primary">Submit</button>
                            <a href="login.html" class="cancel-link">Cancel</a>
                        </div>
                    </form>
                </div>

                <!-- Step 2: OTP Verification -->
                <div id="step-otp" class="forgot-password-step">
                    <h2>Verify OTP</h2>
                    <p style="margin-bottom: 20px;">Enter the OTP sent to <span id="display-email"
                            style="font-weight: 600;"></span></p>
                    <form id="otp-form" onsubmit="handleOtpSubmit(event)">
                        <div class="form-group">
                            <input type="text" id="otp" placeholder="Enter OTP" required>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn-primary">Verify</button>
                            <button type="button" class="btn-secondary-link" onclick="resendOtp()">Resend OTP</button>
                        </div>
                        <div style="margin-top: 15px;">
                            <a href="#" onclick="showStep(document.getElementById('step-email'))"
                                class="cancel-link">Change Email</a>
                        </div>
                    </form>
                </div>

                <!-- Step 3: New Password -->
                <div id="step-password" class="forgot-password-step">
                    <h2>New Password</h2>
                    <p style="margin-bottom: 20px;">Enter your new password.</p>
                    <form id="password-form" onsubmit="handlePasswordSubmit(event)">
                        <div class="form-group">
                            <input type="password" id="new-password" placeholder="New Password" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                        </div>
                        <div class="button-group">
                            <button type="submit" class="btn-primary">Reset Password</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- New Customer Section -->
            <section class="new-customer-section">
                <h2>New Customer</h2>
                <a href="register.html" class="btn-primary"
                    style="text-align: center; text-decoration: none; display: inline-block;">Register</a>
                <!-- Removed paragraph as not in screenshot explicitly, or can keep generic text if desired. kept simple based on screenshot -->
            </section>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="script.js"></script>
    <script src="navbar.js"></script>
    <script src="footer.js"></script>
    <script src="forgot_password.js"></script>
</body>

</html>
